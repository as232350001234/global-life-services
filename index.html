<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta property="og:url" content="https://global.twenhub.com/">
  <meta property="og:image" content="https://global.twenhub.com/assets/og.svg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Global Life Services | 全球生活服务导航">
  <meta name="twitter:description" content="海外购物、手机卡/流量、Visa/虚拟卡、苹果礼品卡、流媒体、出行等全球生活服务导航。支持中英文与站内搜索。">
  <meta name="twitter:image" content="https://global.twenhub.com/assets/og.svg">
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./assets/styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue-router@3.6.5/dist/vue-router.min.js"></script>
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"Organization","name":"Global Life Services","url":"https://global.twenhub.com/"}</script>
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebSite","url":"https://global.twenhub.com/","potentialAction":{"@type":"SearchAction","target":"https://global.twenhub.com/?q={search_term_string}","query-input":"required name=search_term_string"}}</script>
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://global.twenhub.com/"}]}</script>
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"ItemList","name":"Global Life Services Categories","itemListElement":[{"@type":"ListItem","position":1,"name":"Shopping"},{"@type":"ListItem","position":2,"name":"Mobile/Data"},{"@type":"ListItem","position":3,"name":"Visa & Finance"},{"@type":"ListItem","position":4,"name":"Apple Gift Cards"},{"@type":"ListItem","position":5,"name":"Digital Gift Cards"},{"@type":"ListItem","position":6,"name":"Game Cards/Top-ups"},{"@type":"ListItem","position":7,"name":"Streaming"},{"@type":"ListItem","position":8,"name":"Travel"},{"@type":"ListItem","position":9,"name":"Other Services"}]}</script>
</head>
<body>
  <div id="app">
    <header class="site-header">
      <div class="brand">
        <span class="logo-dot"></span>
        <span class="brand-text">Global Life Services</span>
      </div>
      <div class="controls">
        <input class="search" v-model="search" :placeholder="t('searchPlaceholder')" />
        <select class="lang" v-model="lang" @change="persistLang">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>{{ t('title') }}</h1>
        <p class="subtitle">{{ t('subtitle') }}</p>
        <div class="chips">
          <button v-for="c in categories" :key="c.key"
                  class="chip" :class="{active: c.key===activeCategory}"
                  @click="activeCategory=c.key">
            {{ t(c.i18n) }}
          </button>
        </div>
      </section>

      <section class="filters">
        <div class="filter-group">
          <label>{{ t('countryFilter') }}</label>
          <div class="chips wrap">
            <button class="chip small" :class="{active: activeCountry===null}" @click="activeCountry=null">{{ t('all') }}</button>
            <button class="chip small" v-for="c in countries" :key="c.code"
                    :class="{active: activeCountry===c.code}" @click="activeCountry=c.code">
              <img class="flag" :src="flagUrl(c.code)" :alt="c.name[lang] || c.name.en" loading="lazy"> {{ c.name[lang] || c.name.en }}
            </button>
          </div>
        </div>
      </section>

      <section class="grid">
        <a class="card" v-for="item in filteredItems" :key="item.id"
           :href="item.url" target="_blank" rel="noopener noreferrer">
          <div class="card-head">
            <div class="card-title">
              <img v-if="item.country" class="flag" :src="flagUrl(item.country)" :alt="countryName(item.country)" loading="lazy">
              <h3>{{ item.name[lang] || item.name.en }}</h3>
            </div>
            <span class="badge">{{ t(catI18n(item.category)) }}</span>
          </div>
          <p class="desc">{{ item.desc[lang] || item.desc.en }}</p>
          <div class="meta">
            <span v-if="item.country">{{ countryName(item.country) }}</span>
            <span v-if="item.tags && item.tags.length" class="tags">
              <span class="tag" v-for="tg in item.tags" :key="tg">{{ tg }}</span>
            </span>
          </div>
        </a>
      </section>

      <section class="empty" v-if="!filteredItems.length">
        <p>{{ t('noResults') }}</p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p>© {{ new Date().getFullYear() }} Global Life Services</p>
      </div>
    </footer>
  </div>

  <script src="./assets/data.js?v=20250827"></script>
  <script>
    const i18n = {
      zh: {
        title: '全球生活服务导航',
        subtitle: '覆盖海外购物、手机卡/流量、Visa/虚拟卡、苹果礼品卡、流媒体、出行等服务，支持中英文搜索与浏览。',
        searchPlaceholder: '搜索服务/国家/标签…',
        countryFilter: '按国家/地区筛选',
        all: '全部',
        catAll: '全部',
        catShopping: '海外购物',
        catMobile: '手机卡/流量',
        catVisa: 'Visa卡与金融',
        catApple: '苹果礼品卡',
        catGift: '数字礼品卡',
        catGame: '游戏点卡/充值',
        catStreaming: '流媒体/订阅',
        catTravel: '出行/交通',
        catOther: '其他服务',
        noResults: '没有匹配的结果，请调整筛选或搜索词。'
      },
      en: {
        title: 'Global Life Services Navigator',
        subtitle: 'Overseas shopping, mobile SIM/eSIM & data, Visa/virtual cards, Apple gift cards, streaming, travel and more. Bilingual (EN/ZH) with search.',
        searchPlaceholder: 'Search services/country/tags…',
        countryFilter: 'Filter by Country/Region',
        all: 'All',
        catAll: 'All',
        catShopping: 'Shopping',
        catMobile: 'Mobile/Data',
        catVisa: 'Visa & Finance',
        catApple: 'Apple Gift Cards',
        catGift: 'Digital Gift Cards',
        catGame: 'Game Cards/Top-ups',
        catStreaming: 'Streaming',
        catTravel: 'Travel',
        catOther: 'Other',
        noResults: 'No results. Try adjusting filters or search.'
      }
    };

    function detectLang() {
      const saved = localStorage.getItem('gls_lang');
      if (saved) return saved;
      const nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      if (nav.includes('zh')) return 'zh';
      if (nav.includes('en')) return 'en';
      return 'en';
    }

    new Vue({
      el: '#app',
      data: {
        lang: detectLang(),
        search: '',
        activeCategory: 'all',
        activeCountry: null,
        countries: GLS_COUNTRIES,
        items: GLS_ITEMS,
        categories: [
          { key: 'all', i18n: 'catAll' },
          { key: 'shopping', i18n: 'catShopping' },
          { key: 'mobile', i18n: 'catMobile' },
          { key: 'visa', i18n: 'catVisa' },
          { key: 'apple', i18n: 'catApple' },
          { key: 'gift', i18n: 'catGift' },
          { key: 'gaming', i18n: 'catGame' },
          { key: 'streaming', i18n: 'catStreaming' },
          { key: 'travel', i18n: 'catTravel' },
          { key: 'other', i18n: 'catOther' }
        ]
      },
      computed: {
        filteredItems() {
          const cat = this.activeCategory;
          const ctry = this.activeCountry;
          const q = this.search.trim().toLowerCase();
          const tokens = q ? this.synonyms(q) : [];

          return this.items.filter(it => {
            if (cat !== 'all' && it.category !== cat) return false;
            if (ctry && it.country !== ctry) return false;

            if (!q) return true;
            const fields = [
              it.name.en, it.name.zh,
              it.desc.en, it.desc.zh,
              (this.countryName(it.country) || ''),
              (it.tags || []).join(' ')
            ].join(' ').toLowerCase();
            return tokens.some(tok => fields.includes(tok));
          });
        }
      },
      methods: {
        t(key) { return (i18n[this.lang] && i18n[this.lang][key]) || i18n.en[key] || key; },
        persistLang() { localStorage.setItem('gls_lang', this.lang); },
        flagUrl(code) {
          if (!code) return '';
          return `https://flagcdn.com/${code.toLowerCase()}.svg`;
        },
        countryName(code) {
          const c = this.countries.find(c => c.code === code);
          if (!c) return '';
          return c.name[this.lang] || c.name.en;
        },
        synonyms(q) {
          const s = q.toLowerCase();
          const map = {
            '手机卡': ['sim','esim','mobile','phone card','上网卡','流量','预付卡','mvno','carrier'],
            '电话卡': ['sim','esim','mobile','上网卡','流量'],
            '流量': ['data','esim','mobile'],
            '签证': ['visa','prepaid','virtual','card','finance'],
            'visa': ['visa','prepaid','virtual','card','finance'],
            '礼品卡': ['gift card','apple gift','itunes','top up','top-up','digital card'],
            '苹果礼品卡': ['apple gift card','itunes','gift card'],
            '游戏点卡': ['game card','gaming card','top up','top-up','充值','recharge','points'],
            '充值': ['top up','top-up','recharge','points','voucher'],
            'steam': ['steam','game','valve'],
            'psn': ['psn','playstation','playstation store','sony'],
            'playstation': ['psn','playstation store','sony'],
            'xbox': ['xbox','microsoft','game pass'],
            'nintendo': ['nintendo','eshop','switch'],
            'razer': ['razer gold','game card','voucher'],
            'google play': ['google play','android','gift card'],
            'paysafecard': ['paysafecard','prepaid','voucher'],
            'neopay': ['neopay','virtual visa','visa','prepaid','card'],
            'pcgamesupply': ['pcgamesupply','gift card','game card'],
            'carddelivery': ['carddelivery','gift card','apple gift','itunes'],
            '香港': ['hk','hong kong','香港']
          };
          const extra = map[s] || [];
          return Array.from(new Set([s, ...extra]));
        },
        catI18n(catKey) {
          switch (catKey) {
            case 'all': return 'catAll';
            case 'shopping': return 'catShopping';
            case 'mobile': return 'catMobile';
            case 'visa': return 'catVisa';
            case 'apple': return 'catApple';
            case 'gift': return 'catGift';
            case 'gaming': return 'catGame';
            case 'streaming': return 'catStreaming';
            case 'travel': return 'catTravel';
            default: return 'catOther';
          }
        }
      }
    });
  </script>
</body>
</html>
